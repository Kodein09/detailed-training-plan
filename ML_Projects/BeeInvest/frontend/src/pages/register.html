<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewpoint" content="width=device-width, initial-scale=1.0">
    <title>Registration | 🐝Invest</title>
    <link rel="stylesheet" href="../css/register.css">
</head>
<body>
    <div class="registration-container">
        <form>
            <h1 class="registration">Registration 🐝</h1>
            <label for="login">Login:</label>
            <input type="text" id="login" name="login" placeholder="Example_123" required>
            <label for="phone">Phone:</label>
            <input type="tel" id="phone" name="phone" placeholder="+7 123-456-78-90" required>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="example@mail.com" required>
            <label for="password">Create Password:</label>
            <input type="password" id="password" name="password" required>
            <label for="confirm-password">Confirm Password:</label>
            <input type="password" id="confirm-password" name="confirm-password" required>

            <button class="button" type="submit">Registration</button>
        </form>

        <div class="login-footer">
            <a class="already-registered-button" href="login.html">Already Registered?</a>
        </div>

    </div>
</body>
</html>
